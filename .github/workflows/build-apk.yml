name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # 使用稳定版本

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            python3-dev \
            openjdk-17-jdk \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libssl-dev \
            libffi-dev \
            liblzma-dev \
            ccache \
            automake \
            cmake

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: buildozer-${{ runner.os }}
          max-size: 5G

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .cache
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Build APK
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          buildozer android debug
        env:
          BUILDOZER_BUILD_ARCH: arm64-v8a

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: latitude-ai-apk
          path: bin/*.apk
          retention-days: 30

      - name: Show build summary
        if: always()
        run: |
          echo "## 📱 APK 构建结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f bin/*.apk ]; then
            echo "✅ **构建成功！**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 文件信息" >> $GITHUB_STEP_SUMMARY
            ls -lh bin/*.apk | awk '{print "- " $9 ": " $5}' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **构建失败**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "请查看日志了解详情" >> $GITHUB_STEP_SUMMARY
          fi
