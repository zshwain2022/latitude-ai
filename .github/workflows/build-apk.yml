name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git zip unzip \
            autoconf libtool pkg-config \
            python3-dev \
            openjdk-17-jdk-headless \
            zlib1g-dev \
            libncurses5-dev libncursesw5-dev \
            libssl-dev libffi-dev \
            liblzma-dev \
            ccache

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .cache
            /tmp/buildozer_*
          key: buildozer-${{ hashFiles('**/*.spec', '**/requirements*.txt') }}
          restore-keys: |
            buildozer-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer Cython==3.0.11

      - name: Build APK (arm64-v8a)
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          buildozer android debug
        env:
          BUILDOZER_BUILD_ARCH: arm64-v8a

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: latitude-apk-arm64
          path: bin/*.apk
          retention-days: 30

      - name: Show build summary
        run: |
          echo "## 📱 APK 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 文件信息" >> $GITHUB_STEP_SUMMARY
          ls -lh bin/*.apk 2>/dev/null || echo "APK 文件未找到" >> $GITHUB_STEP_SUMMARY
